# Si diamond - precise match to Quantum ESPRESSO example01
# Using more precise lattice constant and higher ecutrho
#
# QE reference: pw.x with ibrav=2, celldm(1)=10.20, ecutwfc=18
# Total energy: -15.8445 Ry
#
system:
  lattice:
    # celldm(1) = 10.20 bohr, a/2 = 5.10 * 0.529177249 = 2.698804 Angstrom
    - [0.0, 2.698804, 2.698804]
    - [2.698804, 0.0, 2.698804]
    - [2.698804, 2.698804, 0.0]
  atoms:
    - {symbol: Si, position: [0.0, 0.0, 0.0]}
    - {symbol: Si, position: [0.25, 0.25, 0.25]}

calculation:
  type: scf
  ecutwfc: 18.0
  ecutrho: 144.0
  xc: LDA_PZ
  kpoints: [4, 4, 4, 1, 1, 1]
  smearing: gaussian
  degauss: 0.02

pseudopotentials:
  Si: pseudopotentials/Si.pz-vbc.UPF

convergence:
  energy: 1e-8
  density: 1e-6
  max_scf_steps: 100
