# Si diamond - 2x2x2 k-grid with real PP
system:
  lattice:
    - [0.0, 2.7155, 2.7155]
    - [2.7155, 0.0, 2.7155]
    - [2.7155, 2.7155, 0.0]
  atoms:
    - {symbol: Si, position: [0.0, 0.0, 0.0]}
    - {symbol: Si, position: [0.25, 0.25, 0.25]}

calculation:
  type: scf
  ecutwfc: 15.0
  xc: LDA_PZ
  kpoints: [2, 2, 2, 0, 0, 0]
  smearing: gaussian
  degauss: 0.02

pseudopotentials:
  Si: pseudopotentials/Si.pz-vbc.UPF

convergence:
  energy: 1e-6
  density: 1e-6
  max_scf_steps: 100
