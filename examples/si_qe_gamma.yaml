# Si diamond - Gamma-only validation against QE test-suite scf-gamma.in
#
# QE reference (benchmark.out.git.inp=scf-gamma.in):
#   Total:  -14.51875980  One-electron: 5.79467920
#   Hartree: 1.63735660   XC: -5.05103702
#   Ewald: -16.89975858   ecutwfc: 12.0, FFT: 15x15x15, 85 PWs
#
system:
  lattice:
    - [0.0, 2.69880378, 2.69880378]
    - [2.69880378, 0.0, 2.69880378]
    - [2.69880378, 2.69880378, 0.0]
  atoms:
    - {symbol: Si, position: [0.0, 0.0, 0.0]}
    - {symbol: Si, position: [0.25, 0.25, 0.25]}

calculation:
  type: scf
  ecutwfc: 12.0
  xc: LDA_PZ
  kpoints: [1, 1, 1, 0, 0, 0]
  smearing: none

pseudopotentials:
  Si: pseudopotentials/Si.pz-vbc.UPF

convergence:
  energy: 1e-10
  density: 1.0
  max_scf_steps: 100
