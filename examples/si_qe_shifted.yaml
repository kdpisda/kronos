# Si diamond - validation against Quantum ESPRESSO example01
#
# QE reference: Total energy = -15.8445 Ry
# (celldm(1) = 10.20 bohr, ecutwfc = 18 Ry, shifted 2x2x2 k-grid)
#
system:
  lattice:
    # celldm(1) = 10.20 bohr => a/2 = 10.20 * 0.529177 / 2 = 2.6988 Angstrom
    - [0.0, 2.6988, 2.6988]
    - [2.6988, 0.0, 2.6988]
    - [2.6988, 2.6988, 0.0]
  atoms:
    - {symbol: Si, position: [0.0, 0.0, 0.0]}
    - {symbol: Si, position: [0.25, 0.25, 0.25]}

calculation:
  type: scf
  ecutwfc: 18.0
  xc: LDA_PZ
  kpoints: [2, 2, 2, 1, 1, 1]
  smearing: gaussian
  degauss: 0.02

pseudopotentials:
  Si: pseudopotentials/Si.pz-vbc.UPF

convergence:
  energy: 1e-6
  density: 1e-6
  max_scf_steps: 100
